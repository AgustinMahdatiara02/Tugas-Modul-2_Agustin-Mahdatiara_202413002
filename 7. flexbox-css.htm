<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 150px;
  border: 1px solid #999;
}

.item {
  background-color: lightblue;
  padding: 20px;
  margin: 10px;
}

</style>
</head>
<body>

<div class="container">
  <div class="item">Item A</div>
  <div class="item">Item B</div>
  <div class="item">Item C</div>
</div>

</body>
</html>
